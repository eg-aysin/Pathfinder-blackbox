version: "3.9"

services:
  salesforce-mock:
    build:
      context: ./salesforce_mock
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    volumes:
      - ./file1.xlsx:/app/data/file1.xlsx:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8003

  recordbox:
    build:
      context: ./recordbox
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - ./file2.xlsx:/app/data/file2.xlsx:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8002

  pathfinder:
    build:
      context: ./pathfinder
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - SALESFORCE_URL=http://salesforce-mock:8003
      - RECORDBOX_URL=http://recordbox:8002
    depends_on:
      - salesforce-mock
      - recordbox
    command: uvicorn main:app --host 0.0.0.0 --port 8001

  enerkey:
    build:
      context: ./enerkey
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PATHFINDER_URL=http://pathfinder:8001
    depends_on:
      - pathfinder
    command: uvicorn main:app --host 0.0.0.0 --port 8000
